<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Cyclist Training">
<title>Cyclist Training Program</title>
<style>
  :root {
    --bg: #f7f7f5;
    --surface: #ffffff;
    --surface2: #f0efec;
    --border: #e2e0db;
    --border-strong: #c8c6c0;
    --text: #1a1a18;
    --text2: #5a5955;
    --text3: #908e89;
    --accent: #2563eb;
    --accent-bg: #eff6ff;
    --accent-text: #1d4ed8;
    --success: #16a34a;
    --success-bg: #f0fdf4;
    --success-text: #15803d;
    --warning: #d97706;
    --warning-bg: #fffbeb;
    --warning-text: #b45309;
    --radius: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --surface: #252522;
      --surface2: #2e2e2b;
      --border: #3a3a36;
      --border-strong: #4e4e4a;
      --text: #f0efe9;
      --text2: #a8a69f;
      --text3: #6e6c66;
      --accent: #3b82f6;
      --accent-bg: #1e3a5f;
      --accent-text: #93c5fd;
      --success-bg: #052e16;
      --success-text: #4ade80;
      --warning-bg: #2d1a00;
      --warning-text: #fbbf24;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; background: var(--bg); color: var(--text); font-size: 16px; line-height: 1.5; min-height: 100vh; }
  .app { max-width: 430px; margin: 0 auto; padding: 0 0 40px; }
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 16px 12px; position: sticky; top: 0; z-index: 10; }
  .header h1 { font-size: 17px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
  .header p { font-size: 12px; color: var(--text2); margin-top: 1px; }
  .tabs { display: flex; gap: 8px; padding: 12px 16px 0; }
  .tab { flex: 1; padding: 9px 8px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); font-size: 14px; font-weight: 500; cursor: pointer; color: var(--text2); text-align: center; transition: all 0.15s; }
  .tab.active { background: var(--accent-bg); color: var(--accent-text); border-color: var(--accent); }
  .week-nav { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px 0; }
  .week-center { text-align: center; }
  .week-label { font-size: 16px; font-weight: 600; color: var(--text); }
  .week-dates { font-size: 12px; color: var(--text2); margin-top: 1px; }
  .phase-badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; margin-top: 3px; }
  .phase-foundation { background: var(--accent-bg); color: var(--accent-text); }
  .phase-build { background: var(--accent-bg); color: var(--accent-text); }
  .phase-deload { background: var(--warning-bg); color: var(--warning-text); }
  .phase-peak { background: var(--success-bg); color: var(--success-text); }
  .nav-btn { padding: 8px 14px; border: 1px solid var(--border-strong); border-radius: var(--radius); background: var(--surface); font-size: 14px; cursor: pointer; color: var(--text); font-weight: 500; min-width: 70px; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .progress-row { display: flex; gap: 5px; padding: 10px 16px 0; }
  .progress-dot { flex: 1; height: 3px; border-radius: 2px; background: var(--border-strong); transition: background 0.2s; }
  .progress-dot.done { background: var(--accent); }
  .progress-dot.current { background: var(--warning); }
  .day-tabs { display: flex; gap: 6px; padding: 10px 16px 0; overflow-x: auto; scrollbar-width: none; }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab { flex-shrink: 0; padding: 7px 14px; border: 1px solid var(--border); border-radius: 20px; background: var(--surface); font-size: 13px; cursor: pointer; color: var(--text2); white-space: nowrap; font-weight: 500; transition: all 0.15s; }
  .day-tab.active { background: var(--surface2); color: var(--text); border-color: var(--border-strong); }
  .day-tab .day-date { font-size: 11px; font-weight: 400; display: block; color: var(--text3); }
  .session-wrap { padding: 12px 16px 0; }
  .session-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .session-header { padding: 12px 14px; border-bottom: 1px solid var(--border); background: var(--surface2); }
  .session-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .session-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .section-label { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; padding: 10px 14px 6px; background: var(--surface2); border-top: 1px solid var(--border); }
  .ex-item { padding: 10px 14px; border-top: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
  .ex-item:active { background: var(--surface2); }
  .ex-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .ex-name { font-size: 14px; font-weight: 500; color: var(--text); flex: 1; }
  .ex-spec { font-size: 13px; color: var(--accent-text); font-weight: 600; white-space: nowrap; }
  .ex-note { font-size: 12px; color: var(--text2); margin-top: 3px; line-height: 1.4; }
  .ex-cue { display: none; font-size: 13px; color: var(--text2); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); line-height: 1.6; }
  .ex-cue.open { display: block; }
  .ex-cue strong { color: var(--text); font-weight: 600; }
  .ex-hint { font-size: 11px; color: var(--text3); margin-top: 6px; }
  .tip-box { margin: 10px 16px 0; background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: var(--radius); padding: 10px 12px; font-size: 13px; color: var(--text2); line-height: 1.5; }
  .tip-box strong { color: var(--text); }
  .done-btn { display: block; width: calc(100% - 32px); margin: 10px 16px 0; padding: 12px; border: 1px solid var(--border-strong); border-radius: var(--radius); background: var(--surface); font-size: 15px; font-weight: 600; cursor: pointer; color: var(--text2); transition: all 0.15s; text-align: center; }
  .done-btn.complete { background: var(--success-bg); color: var(--success-text); border-color: var(--success); }
  .current-indicator { font-size: 11px; color: var(--warning-text); background: var(--warning-bg); border-radius: 20px; padding: 2px 8px; display: inline-block; margin-top: 3px; font-weight: 600; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>&#x1F6B4; Cyclist Training Program</h1>
    <p>8 weeks &middot; Strength M/W/F &middot; Stretch Tu/Th/Sa &middot; Starts Jun 29</p>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-strength" onclick="switchPlan('strength')">&#x1F3CB; Strength</div>
    <div class="tab" id="tab-stretch" onclick="switchPlan('stretch')">&#x1F9D8; Stretch</div>
  </div>

  <div class="week-nav">
    <button class="nav-btn" id="prev-btn" onclick="changeWeek(-1)" disabled>&larr; Prev</button>
    <div class="week-center">
      <div class="week-label" id="week-label">Week 1</div>
      <div class="week-dates" id="week-dates">Jun 29 – Jul 5</div>
      <span class="phase-badge phase-foundation" id="phase-badge">Foundation</span>
    </div>
    <button class="nav-btn" id="next-btn" onclick="changeWeek(1)">Next &rarr;</button>
  </div>

  <div class="progress-row" id="progress-row"></div>
  <div class="day-tabs" id="day-tabs"></div>
  <div class="session-wrap" id="session-content"></div>
</div>

<script>
var plan = 'strength';
var week = 1;
var day = 0;
var done = {};
try { done = JSON.parse(localStorage.getItem('cyc_done') || '{}'); } catch(e){}

var weekMeta = [
  {label:'Week 1', dates:'Jun 29 – Jul 5',  phase:'Foundation'},
  {label:'Week 2', dates:'Jul 6 – Jul 12',  phase:'Foundation'},
  {label:'Week 3', dates:'Jul 13 – Jul 19', phase:'Build'},
  {label:'Week 4', dates:'Jul 20 – Jul 26', phase:'Deload'},
  {label:'Week 5', dates:'Jul 27 – Aug 2',  phase:'Build'},
  {label:'Week 6', dates:'Aug 3 – Aug 9',   phase:'Peak'},
  {label:'Week 7', dates:'Aug 10 – Aug 16', phase:'Peak'},
  {label:'Week 8', dates:'Aug 17 – Aug 23', phase:'Deload'}
];

var phaseClass = {Foundation:'phase-foundation',Build:'phase-build',Deload:'phase-deload',Peak:'phase-peak'};

// Strength days with actual dates per week
var strengthDays = [
  [{day:'Monday',   date:'Jun 30'}, {day:'Wednesday', date:'Jul 2'},  {day:'Friday',    date:'Jul 4'}],
  [{day:'Monday',   date:'Jul 7'},  {day:'Wednesday', date:'Jul 9'},  {day:'Friday',    date:'Jul 11'}],
  [{day:'Monday',   date:'Jul 14'}, {day:'Wednesday', date:'Jul 16'}, {day:'Friday',    date:'Jul 18'}],
  [{day:'Monday',   date:'Jul 21'}, {day:'Wednesday', date:'Jul 23'}, {day:'Friday',    date:'Jul 25'}],
  [{day:'Monday',   date:'Jul 28'}, {day:'Wednesday', date:'Jul 30'}, {day:'Friday',    date:'Aug 1'}],
  [{day:'Monday',   date:'Aug 4'},  {day:'Wednesday', date:'Aug 6'},  {day:'Friday',    date:'Aug 8'}],
  [{day:'Monday',   date:'Aug 11'}, {day:'Wednesday', date:'Aug 13'}, {day:'Friday',    date:'Aug 15'}],
  [{day:'Monday',   date:'Aug 18'}, {day:'Wednesday', date:'Aug 20'}, {day:'Friday',    date:'Aug 22'}]
];

var stretchDays = [
  [{day:'Tuesday',  date:'Jul 1'},  {day:'Thursday',  date:'Jul 3'},  {day:'Saturday',  date:'Jul 5'}],
  [{day:'Tuesday',  date:'Jul 8'},  {day:'Thursday',  date:'Jul 10'}, {day:'Saturday',  date:'Jul 12'}],
  [{day:'Tuesday',  date:'Jul 15'}, {day:'Thursday',  date:'Jul 17'}, {day:'Saturday',  date:'Jul 19'}],
  [{day:'Tuesday',  date:'Jul 22'}, {day:'Thursday',  date:'Jul 24'}, {day:'Saturday',  date:'Jul 26'}],
  [{day:'Tuesday',  date:'Jul 29'}, {day:'Thursday',  date:'Jul 31'}, {day:'Saturday',  date:'Aug 2'}],
  [{day:'Tuesday',  date:'Aug 5'},  {day:'Thursday',  date:'Aug 7'},  {day:'Saturday',  date:'Aug 9'}],
  [{day:'Tuesday',  date:'Aug 12'}, {day:'Thursday',  date:'Aug 14'}, {day:'Saturday',  date:'Aug 16'}],
  [{day:'Tuesday',  date:'Aug 19'}, {day:'Thursday',  date:'Aug 21'}, {day:'Saturday',  date:'Aug 23'}]
];

// Detect current week based on today's date
function getCurrentWeek() {
  var today = new Date();
  var start = new Date('2025-06-29');
  var diff = Math.floor((today - start) / (7 * 24 * 60 * 60 * 1000));
  if (diff < 0) return 1;
  if (diff > 7) return 8;
  return diff + 1;
}

var SP = {
  1:{meta:'3 sets · 10–12 reps · 60s rest · ~45 min',tip:'Week 1 (Jun 29–Jul 5): Dial in form. Move slower than you think you need to. Every rep is technique practice.',sections:[
    {label:'Warm-up',ex:[
      {n:'TRX row',s:'2×10',note:'Scapular activation — elbows to ribs',cue:'Anchor TRX at chest height. Lean back 45°, body rigid. Pull chest to handles, squeeze between shoulder blades at top. Control the descent. <strong>Cyclist fix:</strong> reverses the forward hunch from the drops.'},
      {n:'Bodyweight squat',s:'2×10',note:'Slow, controlled — feel the hips load',cue:'Feet hip-width, toes slightly out. Sit back and down, chest up, knees track over toes. Pause 1 sec at bottom. <strong>Target:</strong> glutes and quads — your engine.'}
    ]},
    {label:'Main Work',ex:[
      {n:'Goblet squat',s:'3×10',note:'Single dumbbell at chest · 20–25 lbs',cue:'Hold one DB vertically at chest. Squat deep — elbows brush inside knees at bottom. Drive through heels to stand. Challenging but form stays clean.'},
      {n:'TRX single-leg deadlift',s:'3×8 each',note:'Light touch on TRX for balance only',cue:'Hold TRX handles loosely. Stand on one leg, hinge at hip, extend free leg behind. Feel hamstring load, return to stand. <strong>Cyclist benefit:</strong> hip hinge pattern + unilateral stability.'},
      {n:'DB Romanian deadlift',s:'3×10',note:'Hip hinge — not a squat · 20–30 lbs',cue:'DBs in front of thighs. Push hips back, slight knee bend, lower DBs along shins until hamstring stretch. Drive hips forward to stand. <strong>This builds your power stroke.</strong>'},
      {n:'TRX push-up',s:'3×10',note:'Feet in handles at knee height',cue:'Hands on floor, body straight. Lower chest toward floor, press back up. <strong>Modification:</strong> handles higher = easier. Core stays rigid throughout.'},
      {n:'DB bent-over row',s:'3×10 each',note:'Elbow drives back, not out · 20–25 lbs',cue:'One hand on knee for support, back flat, parallel to floor. Pull elbow straight back to hip — pause, squeeze, lower slow.'},
      {n:'Dead bug',s:'3×8 each side',note:'Low back pressed to floor the entire set',cue:'Lie on back, arms up, knees bent 90°. Slowly lower opposite arm + leg toward floor, exhale, return. <strong>Cue:</strong> belly button to spine. Do not rush.'}
    ]},
    {label:'Finish',ex:[
      {n:'Plank',s:'3×30s',note:'Build toward 45s in later weeks',cue:'Forearms on floor, elbows under shoulders, body straight head to heels. Squeeze glutes and abs. <strong>Stop</strong> when hips sag — short and tight beats long and saggy.'}
    ]}
  ]},
  2:{meta:'3 sets · 10–12 reps · 60s rest · ~45 min',tip:'Week 2 (Jul 6–12): Same movements, better execution. Add 5 lbs anywhere that felt easy last week.',sections:[
    {label:'Warm-up',ex:[
      {n:'TRX row',s:'2×12',note:'Lean further back than last week',cue:'Increase difficulty by walking feet forward — more horizontal body angle. Feel the lats engage, not just biceps.'},
      {n:'Hip circle + leg swing',s:'2×10 each',note:'Hip mobility primer',cue:'10 hip circles each direction, then 10 forward-back leg swings each leg. Wakes up hip flexors and glutes before loading.'}
    ]},
    {label:'Main Work',ex:[
      {n:'Goblet squat',s:'3×12',note:'Add 5 lbs if Week 1 felt solid · 25–30 lbs',cue:'Pause at bottom 1–2 seconds. This is where the work happens.'},
      {n:'TRX single-leg deadlift',s:'3×10 each',note:'Less reliance on TRX this week',cue:'Try to use TRX only as a balance catch. Add 1s pause at hinge bottom.'},
      {n:'DB Romanian deadlift',s:'3×12',note:'Add 5 lbs if form was clean · 25–35 lbs',cue:'Control the descent for 2–3 counts. Increase range — lower until genuine hamstring stretch.'},
      {n:'TRX push-up',s:'3×12',note:'Handles at shin height — harder',cue:'Lower foot anchor increases instability. Modification: keep feet higher if needed.'},
      {n:'DB bent-over row',s:'3×12 each',note:'Add 5 lbs · 25–30 lbs',cue:'Pause 1 second at top with elbow at hip before lowering.'},
      {n:'Dead bug',s:'3×10 each',note:'Slower tempo — 3 sec descent',cue:'Deliberately slow. The challenge is maintaining back contact with floor under load, not reps.'}
    ]},
    {label:'Finish',ex:[
      {n:'Plank',s:'3×40s',note:'Building 10s from last week',cue:'Add leg lift variation: lift one foot 2 inches, hold 5s, alternate.'}
    ]}
  ]},
  3:{meta:'3–4 sets · 10–15 reps · 60s rest · ~50 min',tip:'Week 3 (Jul 13–19): Volume up. Challenged but controlled. This is the build week.',sections:[
    {label:'Warm-up',ex:[
      {n:'TRX row',s:'2×12',note:'Move to body parallel to floor if ready',cue:'Full horizontal position — most challenging angle. Real pulling work now.'},
      {n:'Lateral band walk',s:'2×12 each',note:'Glute med activation before squats',cue:'No band? Wide stance, slight squat, step sideways 12 steps each direction. Feel the outer hip fire. Critical for knee tracking on the bike.'}
    ]},
    {label:'Main Work',ex:[
      {n:'Goblet squat',s:'4×12',note:'Fourth set added · 30–40 lbs',cue:'4 sets is a meaningful jump. Keep rest to 60s.'},
      {n:'TRX Bulgarian split squat',s:'3×10 each',note:'Rear foot in TRX handle — start light',cue:'Rear foot in TRX handle, front foot forward. Lower back knee toward floor. Devastating quad and glute work. <strong>Start light — this will humble you.</strong>'},
      {n:'DB Romanian deadlift',s:'4×12',note:'4 sets this week · 30–40 lbs',cue:'Posterior chain is your cycling engine. Most important movement in the program.'},
      {n:'DB floor press',s:'3×12',note:'Replaces TRX push-up · 20–30 lbs each',cue:'Lie on floor, DBs at chest, elbows 45°. Press to lockout, lower until triceps touch floor. Floor limits range = safer shoulder position.'},
      {n:'DB bent-over row',s:'4×10 each',note:'Heavier, fewer reps · 30–40 lbs',cue:'This is now a strength movement. Increase weight.'},
      {n:'TRX fallout',s:'3×10',note:'Replaces dead bug — harder',cue:'Hold TRX handles, arms extended overhead, lean body forward keeping rigid. Return. <strong>Scale back to dead bug if you feel it in your lower back.</strong>'}
    ]},
    {label:'Finish',ex:[
      {n:'Plank + side plank',s:'3×45s / 2×30s',note:'Side plank added this week',cue:'Front plank 45s + side plank 30s each side. Core stability transfers directly to a stable platform on the bike.'}
    ]}
  ]},
  4:{meta:'2–3 sets · 10 reps · 90s rest · ~35 min — DELOAD',tip:'Week 4 (Jul 20–26): Back off volume — planned deload. Your body is adapting. Do not skip this week.',sections:[
    {label:'Deload Session',ex:[
      {n:'TRX row',s:'2×10',note:'Easy angle — just move the pattern',cue:'Reduce angle, reduce effort. Keep the motor pattern alive but do not push output.'},
      {n:'Goblet squat',s:'2×10',note:'Week 1 weight — slow and controlled',cue:'Lighter load to really own the bottom position.'},
      {n:'DB Romanian deadlift',s:'3×10',note:'Two-thirds of current max weight',cue:'Stay in touch with the hip hinge. Do not push.'},
      {n:'TRX push-up',s:'2×10',note:'Handles high — easy position',cue:'Maintenance only. Just keep the pattern.'},
      {n:'DB bent-over row',s:'2×10 each',note:'Half weight — smooth',cue:'Full focus on back position and scapular movement.'},
      {n:'Dead bug',s:'2×8 each',note:'Back to basics — slow and deliberate',cue:'Breathing and low back contact. Reset.'}
    ]},
    {label:'Finish',ex:[
      {n:'Plank',s:'2×30s',note:'Easy hold — deload means below your ceiling',cue:'You can do longer. Do not. Deload week means stopping short of max.'}
    ]}
  ]},
  5:{meta:'4 sets · 8–12 reps · 60s rest · ~55 min',tip:'Week 5 (Jul 27–Aug 2): Second block. You have a base now — start pushing the weight.',sections:[
    {label:'Warm-up',ex:[
      {n:'TRX row',s:'2×12',note:'Horizontal — activation',cue:'Warm up the pulling chain before heavy rows. Feel the scapulae move.'},
      {n:'Glute bridge',s:'2×15',note:'Fire glutes before all lower work',cue:'Lie on back, feet flat, push hips to ceiling. Squeeze hard at top, lower slow. Add 5-lb DB on hips if easy.'}
    ]},
    {label:'Main Work',ex:[
      {n:'Goblet squat',s:'4×10',note:'Strength move now · 40–50 lbs',cue:'Fewer reps, more load. Depth and tempo still matter.'},
      {n:'TRX Bulgarian split squat',s:'4×10 each',note:'Add DB in one hand · 15–20 lbs',cue:'Hold DB on the working-leg side. Mimics cycling\'s single-leg power demand.'},
      {n:'DB weighted step-up',s:'4×10 each',note:'12–18" step · 20–30 lbs each',cue:'Hold DBs at sides, step up with one foot, drive through heel to stand. Lower slowly. <strong>Most cycling-specific lift in the program.</strong>'},
      {n:'DB floor press',s:'4×10',note:'Heavier · 30–40 lbs each',cue:'Push the chest work — cyclists are chronically weak here.'},
      {n:'TRX inverted row',s:'4×10',note:'Body horizontal — pull chest between handles',cue:'Handles lower, body more horizontal than standard TRX row. Scapulas fully retract. <strong>Best upper back exercise in the program.</strong>'},
      {n:'Suitcase carry',s:'3×40 steps each',note:'Heavy DB one hand — stay tall · 35–45 lbs',cue:'Walk 40 steps, do not lean toward the weight. Core stability + hip alignment transfers directly to cycling posture.'}
    ]},
    {label:'Finish',ex:[
      {n:'Plank + side plank',s:'3×45s / 3×35s',note:'Maintaining from Week 3',cue:'Front plank 45s + side plank 35s each side. Hold the standard.'}
    ]}
  ]},
  6:{meta:'4 sets · 8–10 reps · 75s rest · ~55 min',tip:'Week 6 (Aug 3–9): Peak block. Higher intensity, slightly more rest. Adaptation is stacking.',sections:[
    {label:'Warm-up',ex:[
      {n:'TRX row',s:'2×10',note:'Activation only',cue:'Easy warm-up for the pulling chain.'},
      {n:'Glute bridge + hip thrust',s:'2×12',note:'Progressive hip activation',cue:'Set 1: bridge on floor. Set 2: shoulders on bench edge, hips lower, drive up. Higher range = more glute activation.'}
    ]},
    {label:'Main Work',ex:[
      {n:'Goblet squat',s:'4×8',note:'Maximum load · 45–55 lbs',cue:'Heaviest weight so far. Control every rep. Form is the governor.'},
      {n:'TRX Bulgarian split squat',s:'4×10 each',note:'DBs both hands · 20–30 lbs each',cue:'Rest full 75s between legs. This is a serious strength movement now.'},
      {n:'DB weighted step-up',s:'4×10 each',note:'Heavier · 25–35 lbs each',cue:'Drive through the heel of the step foot exclusively. <strong>Do not push off the floor foot.</strong>'},
      {n:'DB floor press',s:'4×8',note:'Heaviest chest work · 35–45 lbs each',cue:'8 reps, full control. Pause on floor each rep.'},
      {n:'TRX inverted row',s:'4×10',note:'1s pause at top, 3-count descent',cue:'Slower eccentric adds significant work. Most rowing volume of the program so far.'},
      {n:'Suitcase carry',s:'3×50 steps each',note:'Heavier · 35–45 lbs · walk tall',cue:'Walk tall. Hips level. This tests everything.'}
    ]},
    {label:'Finish',ex:[
      {n:'Plank + side plank + RKC plank',s:'3×50s / 3×40s / 2×25s',note:'RKC plank is new this week',cue:'RKC plank: standard position but squeeze fists, glutes, quads as hard as possible. 25s max. It will feel very different from a regular plank.'}
    ]}
  ]},
  7:{meta:'4 sets · 8–12 reps · 75s rest · ~60 min',tip:'Week 7 (Aug 10–16): Second peak week. You are significantly stronger than Week 1. Trust the work.',sections:[
    {label:'Warm-up',ex:[
      {n:'TRX row',s:'2×10',note:'Horizontal — full activation',cue:'Full scapular retraction. Just warm-up.'},
      {n:'Glute bridge + clamshell',s:'2×15 each',note:'Glute med focus',cue:'Lie on side, knees bent, rotate top knee open. Glute med work = more stable pelvis on the bike.'}
    ]},
    {label:'Main Work',ex:[
      {n:'Goblet squat',s:'4×8',note:'Max weight maintained · 55 lbs',cue:'Work at your ceiling. Form breaks = stop the set.'},
      {n:'TRX Bulgarian split squat',s:'4×12 each',note:'More reps — endurance layer',cue:'12 reps is a grind with heavy DBs. <strong>This mimics a long climb.</strong> Breathe.'},
      {n:'DB weighted step-up',s:'4×12 each',note:'More reps, same weight as Week 6',cue:'Volume over intensity. Your legs are riding 3–4 days too — respect the total load.'},
      {n:'DB floor press',s:'4×10',note:'Volume up from Week 6 · same weight',cue:'Back to 10 reps, maintain Week 6 weight. Highest total chest volume of the program.'},
      {n:'TRX inverted row',s:'4×12',note:'Volume up from Week 6',cue:'12 reps, same difficulty. Your upper back is noticeably stronger than Week 1.'},
      {n:'Suitcase + Farmer carry',s:'3×50 steps',note:'Alternate sets each type',cue:'One set suitcase each side, one set farmer carry (heavy DBs both hands). Different anti-flexion and anti-rotation demands.'}
    ]},
    {label:'Finish',ex:[
      {n:'Plank circuit',s:'1 round',note:'Front 60s → L 45s → R 45s → RKC 20s',cue:'Done as a circuit, minimal rest between. Hardest core session of the program.'}
    ]}
  ]},

function getP() { return plan === 'strength' ? SP : XP; }
function getDaysArr() { return plan === 'strength' ? strengthDays : stretchDays; }
function saveDone() { try { localStorage.setItem('cyc_done', JSON.stringify(done)); } catch(e){} }

function switchPlan(p) {
  plan = p; day = 0;
  document.getElementById('tab-strength').classList.toggle('active', p === 'strength');
  document.getElementById('tab-stretch').classList.toggle('active', p === 'stretch');
  render();
}
function changeWeek(d) {
  week = Math.max(1, Math.min(8, week + d));
  day = 0; render();
}
function toggleCue(id) {
  var el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}
function toggleDone(key) {
  done[key] = !done[key];
  saveDone();
  var btn = document.getElementById('done-' + key);
  if (btn) {
    btn.classList.toggle('complete', done[key]);
    btn.textContent = done[key] ? '✓ Session complete' : 'Mark session complete';
  }
}

function render() {
  var wm = weekMeta[week - 1];
  document.getElementById('week-label').textContent = 'Week ' + week;
  document.getElementById('week-dates').textContent = wm.dates;
  var badge = document.getElementById('phase-badge');
  badge.textContent = wm.phase;
  badge.className = 'phase-badge ' + phaseClass[wm.phase];
  document.getElementById('prev-btn').disabled = week === 1;
  document.getElementById('next-btn').disabled = week === 8;

  var curWeek = getCurrentWeek();
  var pr = document.getElementById('progress-row');
  pr.innerHTML = '';
  for (var i = 1; i <= 8; i++) {
    var d2 = document.createElement('div');
    if (i < curWeek) d2.className = 'progress-dot done';
    else if (i === curWeek) d2.className = 'progress-dot current';
    else d2.className = 'progress-dot';
    pr.appendChild(d2);
  }

  var days = getDaysArr()[week - 1];
  var dt = document.getElementById('day-tabs');
  dt.innerHTML = '';
  days.forEach(function(dy, idx) {
    var btn = document.createElement('div');
    btn.className = 'day-tab' + (idx === day ? ' active' : '');
    btn.innerHTML = dy.day + '<span class="day-date">' + dy.date + '</span>';
    btn.onclick = (function(i){ return function(){ day = i; render(); }; })(idx);
    dt.appendChild(btn);
  });

  var wk = getP()[week];
  var dayInfo = days[day];
  var key = plan + '-w' + week + '-d' + day;
  var isDone = !!done[key];

  var html = '<div class="session-card">';
  html += '<div class="session-header">';
  html += '<div class="session-title">' + dayInfo.day + ', ' + dayInfo.date + ' — ' + (plan === 'strength' ? 'Strength' : 'Stretch') + '</div>';
  html += '<div class="session-meta">' + wk.meta + '</div></div>';

  wk.sections.forEach(function(sec) {
    html += '<div class="section-label">' + sec.label + '</div>';
    sec.ex.forEach(function(ex, ei) {
      var cid = 'cue-' + sec.label.replace(/\W+/g,'-') + ei;
      html += '<div class="ex-item" onclick="toggleCue(\'' + cid + '\')">';
      html += '<div class="ex-row"><span class="ex-name">' + ex.n + '</span><span class="ex-spec">' + ex.s + '</span></div>';
      if (ex.note) html += '<div class="ex-note">' + ex.note + '</div>';
      if (ex.cue) {
        html += '<div class="ex-cue" id="' + cid + '">' + ex.cue;
        html += '<div class="ex-hint">tap to close</div></div>';
      }
      html += '</div>';
    });
  });

  html += '</div>';
  html += '<div class="tip-box"><strong>Coach note:</strong> ' + wk.tip + '</div>';
  html += '<button class="done-btn' + (isDone ? ' complete' : '') + '" id="done-' + key + '" onclick="toggleDone(\'' + key + '\')">' + (isDone ? '✓ Session complete' : 'Mark session complete') + '</button>';

  document.getElementById('session-content').innerHTML = html;
}

// Auto-navigate to current week on load
week = getCurrentWeek();
render();
</script>
